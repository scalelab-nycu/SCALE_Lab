<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact · SCALE Lab</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body data-page="contact">
  <header></header>

  <section class="section">
    <div class="container" style="max-width:720px;">
      <h2>Contact</h2>
      <p class="lead">Visits, collaboration, or advising inquiries are welcome.</p>

      <div class="card">
        <div class="content">
          <h3>實驗室位置</h3>
          <p class="muted" id="contact-address" style="line-height:1.6;"></p>
          <div style="aspect-ratio:16/9; border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-top:16px;">
            <iframe id="contact-map" title="map" width="100%" height="100%" style="border:0" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container" style="padding: 20px 0; border-top: 1px solid var(--border); color: var(--muted);">
      © <span id="yearNow"></span> Sustainable Circuits and Architectures for Layered Eco-chips Lab.
    </div>
  </footer>

  <script src="assets/script.js"></script>
  <script>
    fetch('assets/contact-data.json')
      .then(r => r.json())
      .then(d => {
        const addr = document.getElementById('contact-address');
        addr.textContent = d.address;
        if (d.email) addr.innerHTML += `<br>Email: <a href="mailto:${d.email}">${d.email}</a>`;
        document.getElementById('contact-map').src = d.map_embed;
      })
      .catch(err => console.error('Failed to load contact-data.json:', err));
  </script>
</body>
</html>
