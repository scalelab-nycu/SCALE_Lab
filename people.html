<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>People · SCALE Lab</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="assets/style.css" />

  <style>
    /* ── People page 獨立色系 ── */
    [data-page="people"] {
      --people-primary: #6366f1;
      --people-primary-strong: #4f46e5;
      --people-primary-weak: #eef2ff;
    }
    @media (prefers-color-scheme: dark) {
      [data-page="people"] {
        --people-primary: #818cf8;
        --people-primary-strong: #a5b4fc;
        --people-primary-weak: #1e1b4b;
      }
    }

    /* ── Current Students Cards ── */
    .member-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 24px;
      margin-bottom: 48px;
    }

    .member-card {
      display: flex;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .member-card:hover {
      box-shadow: var(--shadow);
    }

    .member-card-photo {
      width: 130px;
      min-width: 130px;
      height: 160px;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    .member-card-photo-placeholder {
      width: 130px;
      min-width: 130px;
      height: 160px;
      background: var(--people-primary-weak);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 2.2rem;
      flex-shrink: 0;
    }

    .member-card-body {
      padding: 20px 24px;
      flex: 1;
    }

    .member-card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--fg);
      margin-bottom: 2px;
    }

    .member-card-name-en {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .member-card-degree {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .member-card-email {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--people-primary);
      text-decoration: none;
      word-break: break-all;
      margin-top: 4px;
    }

    .member-card-email:hover { opacity: 0.75; }

    /* ── Alumni Table ── */
    .people-table {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 24px;
      margin-bottom: 48px;
    }

    .people-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .people-table tbody tr {
      transition: background 0.15s;
    }

    .people-table tbody tr:hover {
      background: var(--people-primary-weak);
    }

    .people-table tbody tr:last-child td {
      border-bottom: none;
    }

    .people-table td {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      color: var(--fg);
      font-size: 0.95rem;
      vertical-align: middle;
    }

    .td-name {
      width: 180px;
      font-weight: 600;
    }

    .member-degree {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-top: 6px;
    }

    .degree-phd {
      background: color-mix(in oklab, var(--people-primary) 15%, transparent);
      color: var(--people-primary);
    }

    .degree-ms {
      background: color-mix(in oklab, var(--people-primary) 10%, transparent);
      color: var(--people-primary);
    }

    .td-thesis {
      color: var(--fg);
      line-height: 1.5;
    }

    .td-thesis em {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 4px;
    }

    .td-position {
      width: 200px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .section-label {
      margin-top: 48px;
      margin-bottom: 0;
      color: var(--fg);
    }

    @media (max-width: 900px) {
      .member-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .people-table { overflow-x: auto; }
      .people-table table { min-width: 520px; }
      .member-card-photo,
      .member-card-photo-placeholder { width: 100px; min-width: 100px; height: 130px; }
    }
  </style>
</head>

<body data-page="people">
  <header>

  </header>

  <section class="section">
    <div class="container">
      <h2>People</h2>
      <p class="lead">Our research team members and their career destinations.</p>

      <h3 class="section-label">Current Students</h3>
      <div class="member-grid" id="current-grid"></div>

      <h3 class="section-label">Alumni</h3>
      <div class="people-table">
        <table><tbody id="alumni-tbody"></tbody></table>
      </div>
    </div>
  </section>

  <footer>
    <div class="container" style="padding: 20px 0; border-top: 1px solid var(--border); color: var(--muted);">
      © <span id="yearNow"></span> Sustainable Circuits and Architectures for Layered Eco-chips Lab.
    </div>
  </footer>

  <script src="assets/script.js"></script>
  <script>
    function degreeClass(deg) {
      return deg === 'Ph.D.' ? 'degree-phd' : 'degree-ms';
    }

    function renderCurrent(members) {
      return members.map(m => {
        const photoHTML = m.photo
          ? `<img class="member-card-photo" src="${m.photo}" alt="${m.name}"
               onerror="this.outerHTML='<div class=\\'member-card-photo-placeholder\\'>👤</div>'">`
          : `<div class="member-card-photo-placeholder">👤</div>`;

        const nameEnHTML = m.name_en
          ? `<div class="member-card-name-en">${m.name_en}</div>` : '';

        const emailHTML = m.email
          ? `<a class="member-card-email" href="mailto:${m.email}">
               <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                 <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
               </svg>
               ${m.email}
             </a>` : '';

        return `
          <div class="member-card">
            ${photoHTML}
            <div class="member-card-body">
              <div class="member-card-name">${m.name}</div>
              ${nameEnHTML}
              <span class="member-card-degree ${degreeClass(m.degree)}">${m.degree}</span>
              ${emailHTML}
            </div>
          </div>`;
      }).join('');
    }

    function renderAlumni(alumni) {
      return alumni.map(a => `
        <tr>
          <td class="td-name">
            ${a.name}<br>
            <span class="member-degree ${degreeClass(a.degree)}">${a.degree} ${a.year}</span>
          </td>
          <td class="td-thesis">
            ${a.thesis_zh}
            <em>${a.thesis_en}</em>
          </td>
          <td class="td-position">${a.position}</td>
        </tr>`).join('');
    }

    fetch('assets/people-data.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('current-grid').innerHTML = renderCurrent(data.current);
        document.getElementById('alumni-tbody').innerHTML  = renderAlumni(data.alumni);
      })
      .catch(err => console.error('Failed to load people-data.json:', err));
  </script>
</body>
</html>
