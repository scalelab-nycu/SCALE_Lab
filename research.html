<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research · SCALE Lab</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    .research-vision {
      margin-bottom: 48px; padding: 32px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; border-left: 4px solid var(--primary);
    }
    .research-vision h3 { margin: 0 0 16px; color: var(--primary); font-size: 1.3rem; }
    .research-vision p { font-size: 1.05rem; line-height: 1.7; margin: 0; }
    .research-area { margin-bottom: 40px; }
    .area-header {
      background: linear-gradient(135deg, var(--primary-weak), var(--card));
      padding: 24px 32px; border-radius: 12px 12px 0 0;
      border: 1px solid var(--border); border-bottom: none;
    }
    .area-title { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin: 0; line-height: 1.3; }
    .area-subtitle { color: var(--muted); font-size: 1rem; margin: 8px 0 0; }
    .area-content { background: var(--card); border: 1px solid var(--border); border-radius: 0 0 12px 12px; padding: 32px; }
    .research-list { display: grid; gap: 16px; margin: 0; padding: 0; list-style: none; }
    .research-item {
      padding: 16px 20px; background: var(--bg); border-radius: 8px;
      border-left: 3px solid var(--primary); border: 1px solid var(--border); transition: all 0.2s ease;
    }
    .research-item:hover { transform: translateX(4px); box-shadow: var(--shadow); }
    .research-item-title { font-weight: 600; color: var(--fg); margin-bottom: 8px; font-size: 1rem; }
    .research-sublist { margin: 12px 0 0 20px; padding: 0; list-style: none; }
    .research-sublist li { margin-bottom: 8px; padding-left: 16px; position: relative; color: var(--muted); font-size: 0.95rem; line-height: 1.5; }
    .research-sublist li::before { content: "•"; color: var(--primary); position: absolute; left: 0; font-weight: bold; }
    @media (max-width: 880px) {
      .research-vision { padding: 24px 20px; }
      .area-header { padding: 20px 24px; }
      .area-content { padding: 24px 20px; }
      .research-item { padding: 14px 16px; }
    }
  </style>
</head>
<body data-page="research">
  <header></header>

  <section class="section">
    <div class="container">
      <h2>Research Interests</h2>
      <div id="research-content"></div>
    </div>
  </section>

  <footer>
    <div class="container" style="padding: 20px 0; border-top: 1px solid var(--border); color: var(--muted);">
      © <span id="yearNow"></span> Sustainable Circuits and Architectures for Layered Eco-chips Lab.
    </div>
  </footer>
  <script src="assets/script.js"></script>
  <script>
    fetch('assets/research-data.json')
      .then(r => r.json())
      .then(d => {
        const areas = d.areas.map(area => {
          const items = area.items.map(item => {
            const bullets = item.bullets.length
              ? `<ul class="research-sublist">${item.bullets.map(b => `<li>${b}</li>`).join('')}</ul>`
              : '';
            return `
              <li class="research-item">
                <div class="research-item-title">${item.title}</div>
                ${bullets}
              </li>`;
          }).join('');

          return `
            <div class="research-area">
              <div class="area-header">
                <h3 class="area-title">${area.title}</h3>
                <div class="area-subtitle">${area.subtitle}</div>
              </div>
              <div class="area-content">
                <ul class="research-list">${items}</ul>
              </div>
            </div>`;
        }).join('');

        document.getElementById('research-content').innerHTML = `
          <div class="research-vision">
            <h3>Research Goal</h3>
            <p>${d.goal}</p>
          </div>
          ${areas}`;
      })
      .catch(err => console.error('Failed to load research-data.json:', err));
  </script>
</body>
</html>
