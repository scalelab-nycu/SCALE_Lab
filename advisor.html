<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advisor · SCALE Lab</title>
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    .advisor-hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
      margin-bottom: 48px;
    }
    .advisor-photo {
      width: 60%; height: 300px; border-radius: 5px; overflow: hidden;
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      border: 1px solid var(--border); position: relative; box-shadow: var(--shadow);
    }
    .advisor-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
    .advisor-photo.no-image {
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--primary-weak), var(--card));
      color: var(--muted); font-size: 0.9rem; text-align: center;
    }
    .advisor-details h1 { margin: 0 0 16px; font-size: 1.8rem; font-weight: 700; line-height: 1.3; }
    .advisor-details .title { font-size: 1.1rem; color: var(--fg); font-weight: 600; margin-bottom: 8px; }
    .advisor-details .institution { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .contact-grid { display: grid; gap: 8px; font-size: 0.95rem; }
    .contact-item { display: grid; grid-template-columns: 80px 1fr; gap: 12px; }
    .contact-label { color: var(--muted); font-weight: 500; }
    .contact-value { color: var(--fg); }
    .section-block { background: none; border: none; border-radius: 0; padding: 0; margin-bottom: 24px; }
    .section-header { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; color: var(--fg); border-bottom: 2px solid var(--fg); padding-bottom: 8px; }
    .item-list { display: grid; gap: 0; }
    .list-item { padding: 6px 0; border-bottom: 1px solid var(--border); }
    .list-item:last-child { border-bottom: none; }
    .item-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; flex-wrap: wrap; gap: 8px; }
    .item-title { font-weight: 600; color: var(--fg); font-size: 0.95rem; }
    .item-period { color: var(--muted); font-weight: 500; font-size: 0.85rem; white-space: nowrap; }
    .item-description { color: var(--muted); font-size: 0.9rem; line-height: 1.4; }
    .research-grid { display: grid; gap: 0; }
    .research-item { padding: 6px 0 6px 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; line-height: 1.5; position: relative; }
    .research-item::before { content: "•"; color: var(--primary); font-weight: bold; position: absolute; left: 0; font-size: 1.2rem; }
    .research-item:last-child { border-bottom: none; }
    .awards-list { display: grid; gap: 0; }
    .award-item { padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
    .award-item:last-child { border-bottom: none; }
    .award-title { flex: 1; font-size: 0.9rem; line-height: 1.4; }
    .award-year { color: var(--muted); font-weight: 600; font-size: 0.85rem; white-space: nowrap; }
    @media (max-width: 880px) {
      .advisor-hero { grid-template-columns: 1fr; gap: 32px; text-align: center; }
      .advisor-photo { width: 100%; height: 300px; margin: 0 auto; }
      .contact-grid { text-align: left; }
      .contact-item { grid-template-columns: 1fr; gap: 4px; }
      .item-header { flex-direction: column; align-items: flex-start; gap: 4px; }
      .award-item { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body data-page="advisor">
  <header></header>

  <section class="section">
    <div class="container">
      <h2>Advisor</h2>
      <div id="advisor-content"></div>
    </div>
  </section>

  <footer>
    <div class="container" style="padding: 20px 0; border-top: 1px solid var(--border); color: var(--muted);">
      © <span id="yearNow"></span> Sustainable Circuits and Architectures for Layered Eco-chips Lab.
    </div>
  </footer>
  <script src="assets/script.js"></script>
  <script>
    fetch('assets/advisor-data.json')
      .then(r => r.json())
      .then(d => {
        const eduItems = d.education.map(e => `
          <div class="list-item">
            <div class="item-header">
              <span class="item-title">${e.degree}</span>
              <span class="item-period">${e.period}</span>
            </div>
            <div class="item-description">${e.institution}</div>
          </div>`).join('');

        const expItems = d.experience.map(e => `
          <div class="list-item">
            <div class="item-header">
              <span class="item-title">${e.title}</span>
              <span class="item-period">${e.period}</span>
            </div>
            <div class="item-description">${e.institution}</div>
          </div>`).join('');

        const half = Math.ceil(d.research_interests.length / 2);
        const riLeft  = d.research_interests.slice(0, half).map(r => `<div class="research-item">${r}</div>`).join('');
        const riRight = d.research_interests.slice(half).map(r => `<div class="research-item">${r}</div>`).join('');

        const awards = d.awards.map(a => `
          <div class="award-item">
            <div class="award-title">${a.title}</div>
            <div class="award-year">${a.year}</div>
          </div>`).join('');

        document.getElementById('advisor-content').innerHTML = `
          <div class="advisor-hero">
            <div class="advisor-photo">
              <img src="${d.photo}" alt="${d.name_en}"
                onerror="this.parentElement.classList.add('no-image'); this.style.display='none'; this.parentElement.innerHTML='<div>Photo<br>Coming Soon</div>';">
            </div>
            <div class="advisor-details">
              <h1>${d.name_zh}<br>${d.name_en}</h1>
              <div class="title">${d.title}</div>
              <div class="institution">${d.institution}</div>
              <div class="contact-grid">
                <div class="contact-item">
                  <span class="contact-label">Office</span>
                  <span class="contact-value">${d.contact.office}</span>
                </div>
                <div class="contact-item">
                  <span class="contact-label">Phone</span>
                  <span class="contact-value">${d.contact.phone}</span>
                </div>
                <div class="contact-item">
                  <span class="contact-label">Email</span>
                  <span class="contact-value"><a href="mailto:${d.contact.email}">${d.contact.email}</a></span>
                </div>
              </div>
            </div>
          </div>

          <div class="section-block">
            <h3 class="section-header">Education</h3>
            <div class="item-list">${eduItems}</div>
          </div>

          <div class="section-block">
            <h3 class="section-header">Work Experience</h3>
            <div class="item-list">${expItems}</div>
          </div>

          <div class="section-block">
            <h3 class="section-header">Research Interests</h3>
            <div class="grid">
              <div class="col-6"><div class="research-grid">${riLeft}</div></div>
              <div class="col-6"><div class="research-grid">${riRight}</div></div>
            </div>
          </div>

          <div class="section-block">
            <h3 class="section-header">Honors & Awards</h3>
            <div class="awards-list">${awards}</div>
          </div>`;
      })
      .catch(err => console.error('Failed to load advisor-data.json:', err));
  </script>
</body>
</html>
